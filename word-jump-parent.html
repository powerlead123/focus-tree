<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单词惊险跳 - 选择单词</title>
    <link rel="stylesheet" href="word-jump-parent.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <button class="btn-back" onclick="location.href='home.html'">← 返回首页</button>
            <h1>🦘 单词惊险跳</h1>
            <p class="subtitle">从单词本选择5个单词，挑战惊险跳跃！</p>
        </header>

        <div class="main-content">
            <!-- 左侧：单词本列表 -->
            <div class="sidebar">
                <div class="section-title">
                    <span>📖</span>
                    <span>选择单词本</span>
                </div>
                <div class="book-list" id="bookList">
                    <!-- 动态生成单词本列表 -->
                </div>
                <button class="btn-manage" onclick="location.href='word-parent.html'">
                    📚 管理单词本
                </button>
            </div>

            <!-- 右侧：单词选择 -->
            <div class="content-area">
                <div class="word-selector" id="wordSelector">
                    <div class="selector-header">
                        <h3>📝 选择5个单词</h3>
                        <span class="select-counter" id="selectCounter">已选择: 0/5</span>
                    </div>
                    <div class="word-list-select" id="wordListSelect">
                        <div class="empty-state">
                            <div class="empty-icon">📚</div>
                            <p>请先选择一个单词本</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 开始游戏按钮 -->
        <div class="start-section">
            <button class="btn-start" id="startBtn" onclick="startGame()" disabled>
                🚀 开始惊险跳
            </button>
            <p class="start-hint" id="startHint">请从单词本中选择5个单词</p>
        </div>
    </div>

    <script src="word-jump-parent.js"></script>
</body>
</html>
