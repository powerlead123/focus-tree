<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读探险记</title>
    <link rel="stylesheet" href="reading.css">
</head>
<body>
    <div class="container">
        <!-- 关卡地图界面 -->
        <div id="mapScreen" class="screen active">
            <header class="header">
                <button class="btn-back" onclick="goHome()">← 返回</button>
                <h1>📖 阅读探险记</h1>
            </header>

            <div class="map-info">
                <div class="info-card">
                    <div class="info-label">总进度</div>
                    <div class="info-value"><span id="totalProgress">0</span>/30</div>
                </div>
                <div class="info-card">
                    <div class="info-label">总积分</div>
                    <div class="info-value" id="totalScore">0</div>
                </div>
                <div class="info-card">
                    <div class="info-label">连续天数</div>
                    <div class="info-value"><span id="streakDays">0</span>天</div>
                </div>
            </div>

            <div class="chapters" id="chaptersContainer">
                <!-- 章节将在这里动态生成 -->
            </div>
        </div>

        <!-- 家长录入界面 -->
        <div id="parentScreen" class="screen hidden">
            <div class="parent-panel">
                <h2>📝 今日阅读完成情况录入</h2>
                
                <div class="input-group">
                    <label>📚 完成套数：</label>
                    <div class="radio-group">
                        <label><input type="radio" name="sets" value="1"> 1套</label>
                        <label><input type="radio" name="sets" value="2" checked> 2套</label>
                        <label><input type="radio" name="sets" value="3"> 3套</label>
                    </div>
                </div>

                <div class="input-group">
                    <label>⚡ 做题效率：</label>
                    <div class="star-rating" id="efficiencyRating">
                        <span class="star" data-value="1">⭐</span>
                        <span class="star" data-value="2">⭐</span>
                        <span class="star" data-value="3">⭐</span>
                        <span class="star" data-value="4">⭐</span>
                        <span class="star" data-value="5">⭐</span>
                    </div>
                    <div class="rating-hint">速度快、专注度高 (每星+4分)</div>
                </div>

                <div class="input-group">
                    <label>📊 题目难度：</label>
                    <div class="star-rating" id="difficultyRating">
                        <span class="star" data-value="1">⭐</span>
                        <span class="star" data-value="2">⭐</span>
                        <span class="star" data-value="3">⭐</span>
                        <span class="star" data-value="4">⭐</span>
                        <span class="star" data-value="5">⭐</span>
                    </div>
                    <div class="rating-hint">题目越难分数越高 (每星+6分)</div>
                </div>

                <div class="input-group">
                    <label>✅ 答案评分：</label>
                    <div class="star-rating" id="scoreRating">
                        <span class="star" data-value="1">⭐</span>
                        <span class="star" data-value="2">⭐</span>
                        <span class="star" data-value="3">⭐</span>
                        <span class="star" data-value="4">⭐</span>
                        <span class="star" data-value="5">⭐</span>
                    </div>
                    <div class="rating-hint">答题正确率 (每星+6分)</div>
                </div>

                <div class="input-group">
                    <label>💬 备注（可选）：</label>
                    <textarea id="noteInput" placeholder="今天表现如何..."></textarea>
                </div>

                <div class="weapon-preview" id="weaponPreview">
                    <h3>🎁 将获得武器：</h3>
                    <div class="weapon-card" id="weaponCard">
                        <div class="weapon-icon">🔫</div>
                        <div class="weapon-name">基础机枪</div>
                        <div class="weapon-stats">
                            <div class="stat">攻击力：★☆☆☆☆</div>
                            <div class="stat">射速：★☆☆☆☆</div>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="btn btn-primary" onclick="confirmInput()">确认录入</button>
                    <button class="btn btn-secondary" onclick="closeParentPanel()">取消</button>
                </div>
            </div>
        </div>

        <!-- 武器选择界面 -->
        <div id="weaponSelectScreen" class="screen hidden">
            <div class="weapon-select-panel">
                <h2>🎯 选择你的武器</h2>
                <p class="select-hint">根据今天的表现，你可以使用以下武器：</p>
                
                <div class="weapons-grid" id="weaponsGrid">
                    <!-- 武器列表将在这里动态生成 -->
                </div>

                <div class="button-group">
                    <button class="btn btn-primary btn-large" onclick="startGameWithSelectedWeapon()">开始游戏</button>
                    <button class="btn btn-secondary" onclick="backToMapFromWeaponSelect()">返回</button>
                </div>
            </div>
        </div>

        <!-- 游戏界面 -->
        <div id="gameScreen" class="screen hidden">
            <div class="game-hud">
                <div class="hud-left">
                    <div class="hp-bar">
                        <span>❤️ HP:</span>
                        <div class="bar">
                            <div class="bar-fill" id="hpBar"></div>
                        </div>
                        <span id="hpText">100/100</span>
                    </div>
                </div>
                <div class="hud-center">
                    <div class="level-info">第<span id="currentLevel">1</span>关</div>
                    <div class="score-info">得分: <span id="gameScore">0</span></div>
                </div>
                <div class="hud-right">
                    <div class="weapon-info" id="weaponInfo">🔫 基础机枪</div>
                    <button class="btn-change-weapon" onclick="showWeaponChangeInGame()">换武器</button>
                </div>
            </div>

            <!-- 游戏中武器切换面板 -->
            <div class="weapon-change-panel hidden" id="weaponChangePanel">
                <h3>选择武器</h3>
                <div class="weapons-quick-grid" id="weaponsQuickGrid"></div>
                <button class="btn btn-secondary btn-small" onclick="closeWeaponChangePanel()">关闭</button>
            </div>

            <!-- 道具效果显示 -->
            <div class="powerup-display" id="powerupDisplay"></div>

            <canvas id="gameCanvas"></canvas>

            <div class="game-controls">
                <button class="control-btn" id="leftBtn">←</button>
                <button class="control-btn" id="rightBtn">→</button>
            </div>
        </div>

        <!-- 通关界面 -->
        <div id="victoryScreen" class="screen hidden">
            <div class="victory-content">
                <div class="victory-title">🎉 恭喜通关！</div>
                <div class="victory-stars" id="victoryStars">⭐⭐⭐</div>
                <div class="victory-stats">
                    <div class="stat-item">
                        <div class="stat-label">本关得分</div>
                        <div class="stat-value" id="finalScore">0</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">消灭敌人</div>
                        <div class="stat-value"><span id="enemiesKilled">0</span>个</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-label">完成时间</div>
                        <div class="stat-value"><span id="completionTime">0</span>秒</div>
                    </div>
                </div>
                <div class="victory-rewards">
                    <h3>🎁 获得奖励</h3>
                    <div class="reward-list" id="rewardList"></div>
                </div>
                <button class="btn btn-large" onclick="backToMap()">返回地图</button>
            </div>
        </div>
    </div>

    <script src="common.js"></script>
    <script src="reading.js"></script>
</body>
</html>
