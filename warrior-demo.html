<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勇士角色展示 - RPG游戏素材Demo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #f39c12, #e74c3c, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        /* 角色选择器 */
        .character-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .char-btn {
            padding: 15px 30px;
            border: 2px solid #444;
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1.1em;
        }

        .char-btn:hover {
            border-color: #f39c12;
            background: rgba(243,156,18,0.1);
            transform: translateY(-2px);
        }

        .char-btn.active {
            border-color: #f39c12;
            background: rgba(243,156,18,0.2);
            box-shadow: 0 0 20px rgba(243,156,18,0.3);
        }

        .char-btn .level-range {
            display: block;
            font-size: 0.8em;
            color: #888;
            margin-top: 5px;
        }

        /* 主展示区域 */
        .main-display {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .character-stage {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            background: radial-gradient(ellipse at center, rgba(255,255,255,0.05) 0%, transparent 70%);
            border-radius: 15px;
            position: relative;
            overflow: hidden;
        }

        /* 角色画布 */
        .character-canvas {
            width: 400px;
            height: 400px;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }

        /* 等级信息 */
        .level-info {
            text-align: center;
            margin-top: 20px;
        }

        .level-badge {
            display: inline-block;
            background: linear-gradient(135deg, #f39c12, #e74c3c);
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .character-name {
            font-size: 1.5em;
            color: #f39c12;
            margin-bottom: 5px;
        }

        .character-desc {
            color: #888;
            font-size: 1em;
        }

        /* 动画控制按钮 */
        .animation-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .anim-btn {
            padding: 12px 25px;
            border: 2px solid #555;
            background: rgba(255,255,255,0.05);
            color: #fff;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1em;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .anim-btn:hover {
            border-color: #3498db;
            background: rgba(52,152,219,0.1);
        }

        .anim-btn.active {
            border-color: #3498db;
            background: rgba(52,152,219,0.2);
        }

        /* 属性面板 */
        .stats-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }

        .stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
        }

        .stat-label {
            color: #888;
            font-size: 0.9em;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #f39c12;
        }

        /* 升级进度条 */
        .progress-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.03);
            border-radius: 12px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .progress-bar-container {
            height: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #f39c12, #e74c3c);
            border-radius: 10px;
            transition: width 0.5s ease;
        }

        /* 特效 */
        .glow-effect {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(243,156,18,0.2) 0%, transparent 70%);
            border-radius: 50%;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 0.8; }
        }

        /* 加载提示 */
        .loading {
            text-align: center;
            padding: 50px;
            color: #888;
        }

        .loading::after {
            content: '';
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f39c12;
            border-top-color: transparent;
            border-radius: 50%;
            margin-left: 10px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚔️ 勇士进化系统</h1>
        <p class="subtitle">Craftpix.net 免费素材展示 | 精美像素艺术角色</p>

        <!-- 角色选择器 -->
        <div class="character-selector">
            <button class="char-btn active" data-char="1">
                🛡️ 初级勇士
                <span class="level-range">LV 1-20</span>
            </button>
            <button class="char-btn" data-char="2">
                ⚔️ 进阶骑士
                <span class="level-range">LV 21-35</span>
            </button>
            <button class="char-btn" data-char="3">
                👑 传奇英雄
                <span class="level-range">LV 36-50</span>
            </button>
        </div>

        <!-- 主展示区域 -->
        <div class="main-display">
            <div class="character-stage">
                <div class="glow-effect"></div>
                <canvas class="character-canvas" id="charCanvas"></canvas>
            </div>

            <div class="level-info">
                <div class="level-badge" id="levelBadge">LV 1</div>
                <div class="character-name" id="charName">初级勇士</div>
                <div class="character-desc" id="charDesc">刚踏上冒险之路的年轻战士</div>
            </div>

            <!-- 动画控制 -->
            <div class="animation-controls">
                <button class="anim-btn active" data-anim="idle">
                    🧍 待机
                </button>
                <button class="anim-btn" data-anim="walk">
                    🚶 行走
                </button>
                <button class="anim-btn" data-anim="run">
                    🏃 奔跑
                </button>
                <button class="anim-btn" data-anim="attack">
                    ⚔️ 攻击
                </button>
                <button class="anim-btn" data-anim="hurt">
                    💥 受伤
                </button>
                <button class="anim-btn" data-anim="dead">
                    💀 死亡
                </button>
            </div>

            <!-- 属性面板 -->
            <div class="stats-panel">
                <div class="stat-card">
                    <div class="stat-label">攻击力</div>
                    <div class="stat-value" id="statAtk">15</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">防御力</div>
                    <div class="stat-value" id="statDef">10</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">生命值</div>
                    <div class="stat-value" id="statHp">100</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">速度</div>
                    <div class="stat-value" id="statSpd">8</div>
                </div>
            </div>

            <!-- 升级进度 -->
            <div class="progress-section">
                <div class="progress-header">
                    <span>当前等级进度</span>
                    <span id="progressText">0%</span>
                </div>
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 角色配置 - 根据实际像素数据配置
        const characters = {
            1: {
                name: '初级勇士',
                desc: '刚踏上冒险之路的年轻战士，拥有基础剑术',
                levelRange: 'LV 1-20',
                baseLevel: 1,
                stats: { atk: 15, def: 10, hp: 100, spd: 8 },
                path: 'warrior-sprites/craftpix-net-589520-free-warrior-pixel-art-sprite-sheets/Warrior_1/',
                animations: {
                    idle: { file: 'Idle.png', frameCount: 6, fps: 8 },    // 576/6=96px
                    walk: { file: 'Walk.png', frameCount: 8, fps: 12 },   // 768/8=96px
                    run: { file: 'Run.png', frameCount: 6, fps: 15 },    // 576/6=96px
                    attack: { file: 'Attack_1.png', frameCount: 6, fps: 10 },
                    hurt: { file: 'Hurt.png', frameCount: 2, fps: 8 },    // 192/2=96px
                    dead: { file: 'Dead.png', frameCount: 4, fps: 6 }     // 384/4=96px
                }
            },
            2: {
                name: '进阶骑士',
                desc: '身披重甲的骑士，掌握防御技巧和盾牌格挡',
                levelRange: 'LV 21-35',
                baseLevel: 21,
                stats: { atk: 35, def: 28, hp: 250, spd: 12 },
                path: 'warrior-sprites/craftpix-net-589520-free-warrior-pixel-art-sprite-sheets/Warrior_2/',
                animations: {
                    idle: { file: 'Idle.png', frameCount: 5, fps: 8 },   // 480/5=96px
                    walk: { file: 'Walk.png', frameCount: 8, fps: 12 },
                    run: { file: 'Run.png', frameCount: 8, fps: 15 },
                    attack: { file: 'Attack_1.png', frameCount: 5, fps: 10 },
                    hurt: { file: 'Hurt.png', frameCount: 3, fps: 8 },  // 3帧
                    dead: { file: 'Dead.png', frameCount: 4, fps: 6 }
                }
            },
            3: {
                name: '传奇英雄',
                desc: '传说中的英雄，拥有无与伦比的战斗技巧和装备',
                levelRange: 'LV 36-50',
                baseLevel: 36,
                stats: { atk: 65, def: 50, hp: 500, spd: 18 },
                path: 'warrior-sprites/craftpix-net-589520-free-warrior-pixel-art-sprite-sheets/Warrior_3/',
                animations: {
                    idle: { file: 'Idle.png', frameCount: 5, fps: 8 },   // 480/5=96px
                    walk: { file: 'Walk.png', frameCount: 8, fps: 12 },
                    run: { file: 'Run.png', frameCount: 8, fps: 15 },
                    attack: { file: 'Attack_1.png', frameCount: 5, fps: 10 },
                    hurt: { file: 'Hurt.png', frameCount: 2, fps: 8 },  // 2帧
                    dead: { file: 'Dead.png', frameCount: 4, fps: 6 }
                }
            }
        };

        let currentChar = 1;
        let currentAnim = 'idle';
        let animationId = null;
        let currentFrame = 0;
        let lastFrameTime = 0;
        let spriteImage = null;
        let frameWidth = 0;
        let frameHeight = 0;

        const canvas = document.getElementById('charCanvas');
        const ctx = canvas.getContext('2d');

        // 加载精灵图
        async function loadSprite(charId, animName) {
            const char = characters[charId];
            const anim = char.animations[animName];
            const path = char.path + anim.file;

            return new Promise((resolve, reject) => {
                const img = new Image();
                img.onload = () => {
                    spriteImage = img;
                    frameWidth = img.width / anim.frameCount;
                    frameHeight = img.height;
                    
                    console.log(`加载 ${char.name}/${animName}: ${img.width}x${img.height}, ${anim.frameCount}帧`);
                    
                    // 设置canvas大小为固定400x400
                    canvas.width = 400;
                    canvas.height = 400;
                    
                    resolve();
                };
                img.onerror = reject;
                img.src = path;
            });
        }

        // 渲染帧
        function renderFrame(frameIndex) {
            if (!spriteImage) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const char = characters[currentChar];
            const anim = char.animations[currentAnim];
            const sx = frameIndex * frameWidth;
            
            // 计算缩放比例，让角色填满画布
            const scaleX = canvas.width / frameWidth;
            const scaleY = canvas.height / frameHeight;
            const scale = Math.min(scaleX, scaleY);
            
            // 居中绘制
            const destW = frameWidth * scale;
            const destH = frameHeight * scale;
            const destX = (canvas.width - destW) / 2;
            const destY = (canvas.height - destH) / 2;
            
            ctx.drawImage(
                spriteImage,
                sx, 0, frameWidth, frameHeight,
                destX, destY, destW, destH
            );
        }

        // 动画循环
        function animate(currentTime) {
            const char = characters[currentChar];
            const anim = char.animations[currentAnim];
            const frameInterval = 1000 / anim.fps;

            if (currentTime - lastFrameTime >= frameInterval) {
                // 死亡动画只播放一次，停在最后一帧
                if (currentAnim === 'dead' && currentFrame >= anim.frameCount - 1) {
                    // 死亡动画结束，不再更新
                } else {
                    currentFrame = (currentFrame + 1) % anim.frameCount;
                    renderFrame(currentFrame);
                }
                lastFrameTime = currentTime;
            }

            animationId = requestAnimationFrame(animate);
        }

        // 切换动画
        async function switchAnimation(animName) {
            if (animationId) {
                cancelAnimationFrame(animationId);
            }

            currentAnim = animName;
            currentFrame = 0;
            lastFrameTime = 0;

            try {
                await loadSprite(currentChar, animName);
                animationId = requestAnimationFrame(animate);
            } catch (err) {
                console.error('加载动画失败:', err);
                ctx.fillStyle = '#fff';
                ctx.font = '14px Arial';
                ctx.textAlign = 'center';
                ctx.fillText('加载中...', canvas.width/2, canvas.height/2);
            }
        }

        // 切换角色
        function switchCharacter(charId) {
            currentChar = parseInt(charId);
            const char = characters[charId];

            // 更新UI
            document.getElementById('levelBadge').textContent = char.levelRange;
            document.getElementById('charName').textContent = char.name;
            document.getElementById('charDesc').textContent = char.desc;

            // 更新属性
            document.getElementById('statAtk').textContent = char.stats.atk;
            document.getElementById('statDef').textContent = char.stats.def;
            document.getElementById('statHp').textContent = char.stats.hp;
            document.getElementById('statSpd').textContent = char.stats.spd;

            // 更新进度条
            const progress = charId === 1 ? 0 : (charId === 2 ? 40 : 70);
            document.getElementById('progressBar').style.width = progress + '%';
            document.getElementById('progressText').textContent = progress + '%';

            // 重新加载动画
            switchAnimation(currentAnim);
        }

        // 事件监听
        document.querySelectorAll('.char-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.char-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchCharacter(btn.dataset.char);
            });
        });

        document.querySelectorAll('.anim-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.anim-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                switchAnimation(btn.dataset.anim);
            });
        });

        // 初始化
        switchCharacter(1);
    </script>
</body>
</html>
